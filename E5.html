<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau de synthèse E5</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ================= VARIABLES (tons identiques à veille.html) ================= */
:root {
    --marron-clair: #D2B48C;
    --marron-moyen: #A67C52;
    --marron-fonce: #8B4513;
    --beige: #F5DEB3;
    --beige-clair: #FAF0E6;
    --blanc: #FFFFFF;
    --texte-fonce: #5D4A3A;
    --shadow-small: 0 2px 5px rgba(0,0,0,0.1);
    --shadow-medium: 0 5px 15px rgba(0,0,0,0.2);
}

/* ================= BASE ================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Raleway', sans-serif;
    background: var(--beige-clair);
    color: var(--texte-fonce);
    min-height: 100vh;
    padding: 40px 20px;
    position: relative;
    display: flex;
    flex-direction: column;
}

/* ================= TOP NAVIGATION ================= */
.top-nav {
    position: fixed;
    top: 0;
    right: 0;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(5px);
    padding: 15px 30px;
    display: flex;
    gap: 20px;
    z-index: 99;
    box-shadow: var(--shadow-small);
    border-bottom-left-radius: 10px;
}

.top-nav a {
    color: var(--marron-fonce);
    text-decoration: none;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 5px;
    transition: all 0.3s;
    font-size: 0.95rem;
}

.top-nav a:hover {
    background: rgba(210, 180, 140, 0.2);
}

/* Style pour le lien actif */
.top-nav a[href="E5.html"] {
    background: linear-gradient(135deg, var(--marron-clair), var(--marron-moyen));
    color: white;
    box-shadow: var(--shadow-small);
}

/* ================= CONTENEUR PRINCIPAL ================= */
.container {
    max-width: 1000px;
    width: 100%;
    background: var(--blanc);
    border-radius: 20px;
    padding: 40px;
    box-shadow: var(--shadow-medium);
    position: relative;
    overflow: hidden;
    margin: 0 auto;
    margin-top: 80px;
    border: 1px solid var(--beige);
    flex: 1;
}

/* Fond animé */
.container::before {
    content: "";
    position: absolute;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, var(--beige-clair), transparent);
    top: -80px;
    right: -80px;
    opacity: 0.5;
    animation: float 8s ease-in-out infinite;
    border-radius: 50%;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(20px); }
}

/* ================= TITRE ================= */
.title {
    text-align: center;
    margin-bottom: 30px;
    position: relative;
    z-index: 2;
}

.title h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    color: var(--marron-fonce);
    position: relative;
    display: inline-block;
    padding-bottom: 14px;
}

.title h1::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 4px;
    background: linear-gradient(to right, var(--marron-clair), var(--marron-moyen));
    border-radius: 2px;
}

/* ================= CONTENEUR PDF ================= */
.pdf-container {
    background: var(--beige-clair);
    border-radius: 15px;
    padding: 20px;
    box-shadow: var(--shadow-small);
    border: 1px solid var(--beige);
    position: relative;
    z-index: 2;
    border-top: 4px solid var(--marron-clair);
    transition: all 0.3s;
}

.pdf-container:hover {
    border-top-color: var(--marron-moyen);
    box-shadow: var(--shadow-medium);
}

/* Titre simple */
.pdf-title {
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--beige);
    color: var(--marron-fonce);
    font-size: 1.2rem;
    font-weight: 600;
    font-family: 'Playfair Display', serif;
    display: flex;
    align-items: center;
    gap: 10px;
}

/* Visualiseur PDF */
.pdf-viewer {
    width: 100%;
    height: 700px;
    border: 2px solid var(--beige);
    border-radius: 10px;
    overflow: hidden;
    background: white;
}

.pdf-viewer iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* ================= FOOTER ================= */
footer {
    text-align: center;
    padding: 2rem;
    background: linear-gradient(135deg, var(--marron-clair), var(--marron-moyen));
    color: white;
    margin-top: 40px;
    border-radius: 0;
}

/* ================= RESPONSIVE ================= */
@media (max-width: 992px) {
    .top-nav {
        padding: 10px 20px;
        gap: 15px;
    }
    
    .top-nav a {
        font-size: 0.85rem;
        padding: 4px 8px;
    }
}

@media (max-width: 768px) {
    body {
        padding: 20px 10px;
    }
    
    .container {
        padding: 25px;
        margin-top: 120px;
    }
    
    .title h1 {
        font-size: 2rem;
    }
    
    .pdf-viewer {
        height: 500px;
    }
    
    .top-nav {
        flex-wrap: wrap;
        justify-content: flex-end;
        width: 100%;
        border-radius: 0;
        border-bottom-left-radius: 0;
        padding: 10px 15px;
        gap: 8px;
    }
    
    .top-nav a {
        font-size: 0.8rem;
        white-space: nowrap;
    }
}

@media (max-width: 480px) {
    .container {
        padding: 15px;
        margin-top: 140px;
    }
    
    .pdf-viewer {
        height: 400px;
    }
    
    .title h1 {
        font-size: 1.8rem;
    }
    
    .top-nav {
        flex-wrap: wrap;
        padding: 8px 10px;
    }
    
    .top-nav a {
        font-size: 0.75rem;
        padding: 3px 6px;
    }
}

</style>
</head>
<body>

<!-- Top navigation -->
<nav class="top-nav" aria-label="Navigation supérieure">
    <a href="jbportfolio.html">Accueil</a>
    <a href="entreprise.html">Entreprise</a>
    <a href="realisation.html">Réalisations professionnelles/Compétences</a>
    <a href="veille.html">Veille Technologique</a>
    <a href="E5.html">E5</a>
    <a href="Contact.html">Contact</a>
</nav>

<div class="container">
    <div class="title">
        <h1>E5</h1>
    </div>
    
    <div class="pdf-container">
        <div class="pdf-title">
            <span>📄</span> Tableau de synthèse — Épreuve E5
        </div>
        
        <div class="pdf-viewer">
            <iframe src="TablSynth1.pdf" allowfullscreen></iframe>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 BEAGLE Jacky-Anaïs</p>
</footer>

</body>
</html>
